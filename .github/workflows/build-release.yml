name: Build Release

on:
  # 手动触发：GitHub → Actions → Build Release → Run workflow
  workflow_dispatch:

  # 推送 tag 时自动构建 Win + Mac 并发布 Release（如 v1.0.0）
  push:
    tags:
      - 'v*'

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v7
        with:
          name: windows-setup
          path: release/*Setup*.exe
          if-no-files-found: error

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: release/*-win.zip
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build:mac

      - name: Upload macOS dmg
        uses: actions/upload-artifact@v7
        with:
          name: mac-dmg
          path: release/*.dmg
          if-no-files-found: error

      - name: Upload macOS zip
        uses: actions/upload-artifact@v7
        with:
          name: mac-zip
          path: release/*-mac.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-win, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*Setup*.exe
            packages/*-win.zip
            packages/*.dmg
            packages/*-mac.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
